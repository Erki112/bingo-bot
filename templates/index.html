<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Bingo</title>
    <style>
        body { background-color: #1a1a2e; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .header-stats { display: flex; justify-content: space-around; background: #16213e; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 10px; background: #0f3460; border-radius: 10px; }
        .cell { background: #1a1a2e; border: 1px solid #16213e; padding: 15px 0; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .cell.active { background: #e74c3c; color: white; }
        .footer-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: #00d2ff; color: #1a1a2e; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div><small>WALLET</small><br><b>$100</b></div>
        <div><small>ACTIVE</small><br><b>50</b></div>
        <div><small>STAKE</small><br><b>$10</b></div>
    </div>

    <h3>BINGO BOARD</h3>
    <div class="grid" id="bingo-grid">
        <!-- Lakkoofsonni asitti uumamu -->
    </div>

    <div class="footer-buttons">
        <button class="btn" onclick="window.location.reload()">REFRESH</button>
        <button class="btn" style="background: #4cd137;">PLAY NOW</button>
    </div>

    <script>
        const grid = document.getElementById('bingo-grid');
        for (let i = 1; i <= 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = Math.floor(Math.random() * 99) + 1;
            cell.onclick = function() { this.classList.toggle('active'); };
            grid.appendChild(cell);
        }
    </script>
</body>
</html>
