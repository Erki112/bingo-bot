<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qaroo Bingo Professional</title>
    <style>
        :root { --bg: #12182b; --card-bg: #1e253a; --accent: #fbbf24; --blue: #3b82f6; --green: #22c55e; --red: #ef4444; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; text-align: center; }
        
        /* Header Timer */
        #game-timer { color: #5eead4; font-size: 16px; margin-bottom: 10px; font-weight: bold; height: 20px; }

        /* Card Selector (1-130) */
        .selector-grid { 
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; 
            background: var(--card-bg); padding: 8px; border-radius: 8px; 
            max-height: 250px; overflow-y: auto; border: 1px solid #334155;
        }
        .card-no { 
            background: #2d3748; padding: 8px 0; border-radius: 4px; font-size: 11px; 
            cursor: pointer; border: 1px solid transparent; transition: 0.2s;
        }
        .card-no.taken { background: var(--red); cursor: not-allowed; opacity: 0.7; }
        .card-no.selected { background: var(--green); border-color: white; }

        /* My Playing Card (Bottom) */
        .my-card-area { margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
        .bingo-board { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; 
            background: #000; padding: 10px; border-radius: 12px; width: 280px; 
        }
        .cell { 
            background: #334155; height: 45px; display: flex; align-items: center; 
            justify-content: center; border-radius: 6px; font-weight: bold; font-size: 16px; 
            cursor: pointer; border: 1px solid #4a5568;
        }
        .cell.marked { background: var(--green); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        /* Footer Buttons */
        .footer-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-refresh { background: var(--accent); color: black; }
        .btn-select { background: var(--blue); }
        .btn-join { background: var(--green); }

        /* Called Ball Display */
        .caller-circle { 
            width: 60px; height: 60px; background: var(--red); border-radius: 50%; 
            line-height: 60px; font-size: 24px; font-weight: bold; margin: 10px auto; 
            border: 3px solid white; display: none;
        }
    </style>
</head>
<body>

    <div id="game-timer">Starting game in 60 sec</div>

    <div class="selector-grid" id="card-selector">
        <!-- 1-130 Numbers will be here -->
    </div>

    <div class="my-card-area">
        <div class="caller-circle" id="caller">?</div>
        <div class="bingo-board" id="board">
            <!-- 5x5 Grid -->
        </div>
    </div>

    <div class="footer-btns">
        <button class="btn btn-refresh" onclick="generateNewCard()">Refresh</button>
        <button class="btn btn-select">Select Number</button>
        <button class="btn btn-join" id="join-btn" onclick="joinGame()">Join Game</button>
    </div>

    <script>
        let myNumbers = [];
        let calledBalls = [];
        let isJoined = false;
        let selectedCards = [13, 14, 16, 26, 27, 33, 38, 42, 47, 57, 63, 67, 76, 77, 92, 94, 96, 98, 99, 108, 119, 129]; // Simulation: cards already taken

        // 1. Create 1-130 Selector
        const selector = document.getElementById('card-selector');
        for (let i = 1; i <= 130; i++) {
            let div = document.createElement('div');
            div.className = 'card-no';
            if(selectedCards.includes(i)) div.classList.add('taken');
            div.innerText = i;
            div.onclick = function() {
                if(isJoined || this.classList.contains('taken')) return;
                document.querySelectorAll('.card-no').forEach(d => d.classList.remove('selected'));
                this.classList.add('selected');
            };
            selector.appendChild(div);
        }

        // 2. Generate 5x5 Card
        function generateNewCard() {
            if(isJoined) return;
            const board = document.getElementById('board');
            board.innerHTML = '';
            myNumbers = [];
            while(myNumbers.length < 25) {
                let r = Math.floor(Math.random() * 75) + 1;
                if(!myNumbers.includes(r)) myNumbers.push(r);
            }
            myNumbers.forEach(num => {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = num;
                cell.onclick = () => { if(calledBalls.includes(num)) cell.classList.add('marked'); };
                board.appendChild(cell);
            });
        }

        // 3. Join Game & Timer
        function joinGame() {
            const selected = document.querySelector('.card-no.selected');
            if(!selected) return alert("Maaloo dura card tokko filadhu!");
            
            isJoined = true;
            document.getElementById('join-btn').innerText = "Joined ✅";
            document.getElementById('join-btn').disabled = true;

            let timeLeft = 60; // Seconds
            let countdown = setInterval(() => {
                timeLeft--;
                document.getElementById('game-timer').innerText = `Starting game in ${timeLeft} sec`;
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    document.getElementById('game-timer').innerText = "GAME LIVE!";
                    startDrawing();
                }
            }, 1000);
        }

        // 4. Draw Balls
        function startDrawing() {
            document.getElementById('caller').style.display = 'block';
            let drawInterval = setInterval(() => {
                if(calledBalls.length >= 75) clearInterval(drawInterval);
                let ball;
                do { ball = Math.floor(Math.random() * 75) + 1; } while(calledBalls.includes(ball));
                calledBalls.push(ball);
                document.getElementById('caller').innerText = ball;
            }, 4000);
        }

        generateNewCard();
    </script>
</body>
</html>
