<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Bingo</title>
    <style>
        /* Design halluu fi boca fakkii sanaa */
        body { 
            background-color: #1a1a2e; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 10px;
            overflow-x: hidden;
        }

        /* Header Stats (Wallet, Active, Stake) */
        .header-stats { 
            display: flex; 
            justify-content: space-around; 
            background: #16213e; 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 10px;
            border: 1px solid #0f3460;
        }
        .stat-box { 
            border-right: 1px solid #444; 
            padding: 0 10px; 
            width: 33%;
        }
        .stat-box:last-child { border-right: none; }
        .stat-label { color: #f1c40f; font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-weight: bold; font-size: 16px; }

        .timer { color: #00d2ff; font-size: 14px; margin: 10px 0; font-weight: bold; }

        /* Bingo Grid (10 columns) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 4px; 
            padding: 5px;
            background: #0f3460;
            border-radius: 8px;
        }
        .cell { 
            background: #1a1a2e; 
            border-radius: 4px; 
            padding: 10px 0; 
            font-size: 12px; 
            font-weight: bold;
            border: 1px solid #16213e;
            transition: 0.3s;
        }
        /* Halluu diimaa lakkoofsota ba'aniif */
        .cell.active { 
            background: #e74c3c; 
            color: white; 
            border-color: #ff4d4d;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }

        /* Footer Buttons */
        .footer-buttons { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 20px; 
            gap: 10px;
        }
        .btn { 
            padding: 12px; 
            border-radius: 8px; 
            border: none; 
            font-weight: bold; 
            color: white;
            flex: 1;
            cursor: pointer;
        }
